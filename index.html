<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>우리 조 버킷리스트 아트 월</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap"
      rel="stylesheet"
    />
    <style>
      /*  */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Nanum Pen Script", cursive;
        background-color: #d4b895;
        background-image: url("https://cdn.pixabay.com/photo/2021/01/23/16/32/mountainous-5942962_1280.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        text-align: center;
        padding-bottom: 100px;
      }
      header {
        margin: 40px auto 40px auto;
        background-color: rgba(255, 255, 255, 0.9);
        display: inline-block;
        padding: 20px 40px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        position: sticky;
        top: 20px;
        z-index: 100;
      }
      h1 {
        color: #333;
        font-size: 2.8rem;
        margin-bottom: 10px;
      }
      .clearfix::after {
        content: "";
        display: block;
        clear: both;
      }
      .gallery-container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* 공통 카드 스타일 */
      .card {
        float: left;
        width: 31.33%;
        margin: 5%;
        background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
        padding: 15px 15px 35px 15px;
        border-radius: 2px 2px 15px 5px;
        box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.15);
        position: relative; /* 자식인 badge의 기준점 */
        transform: rotate(-3deg);
        transition:
          transform 0.3s ease,
          z-index 0s;
      }
      .card:hover {
        transform: scale(1.05) rotate(0deg);
        z-index: 10;
      }
      .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 5px;
        margin-bottom: 15px;
      }
      .card h2 {
        color: #2c3e50;
        font-size: 1.8rem;
        margin-bottom: 10px;
        transition: transform 0.3s ease;
      }
      .card h2:hover {
        color: #547190;
        transform: scale(1.05);
        font-size: 1.9rem;
      }
      .card p {
        color: #444;
        font-size: 1.3rem;
        text-align: left;
        line-height: 1.5;
        transition: transform 0.3s ease;
      }
      .card p:hover {
        color: #6b6b6b;
        font-size: 1.4rem;
        transform: translatex(5px);
      }
      .card .imgbadge:hover {
        transform: scale(1.1) rotate(5deg);
      }
      .card:active h2 {
        visibility: hidden;
      }
      .card:active p {
        visibility: hidden;
      }
      .secret-memo {
        color: #d38585;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        letter-spacing: 2px;
        line-height: 1.5;
      }
      .card:active .secret-memo {
        visibility: visible !important;
      }
    </style>
  </head>
  <body>
    <div style="position: sticky; background-color: #2c3e5077">
      <header>
        <h1>🏖️ 2026 버킷리스트 아트 월 🏖️</h1>
        <p style="font-size: 1.5rem; color: #c1a7a7">
          우리 조의 꿈들을 코르크 보드에 붙였습니다!
        </p>
      </header>
    </div>
    <main class="gallery-container clearfix"></main>
    <!-- 팀원카드 시작 -->

    <!-- 팀원 카드 끝 -->
  </body>
</html>
