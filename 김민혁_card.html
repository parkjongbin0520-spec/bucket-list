<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 버킷리스트 카드</title>
    <style>
        .card {
            width: 300px;
            margin: 50px auto;
            background: linear-gradient(135deg, #e0f7fa 0%, #fffde7 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15);

            
            position: relative; 
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .card h2 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .card p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff6b6b;
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 10px;
        }

        
        .secret {
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #555;
        }

        
        .card:hover .secret {
            visibility: visible;
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="card">
        
        <div class="badge">✈️ 🚗</div>

        
        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=500" alt="유럽">

        
        <h2>✨ 김민혁의 버킷리스트</h2>

        
        <p>✈️ 1. 유럽 여행 가기</p>
        <p>🚗 2. 내 차 구매하기</p>

        
        <p class="secret">👉 사실 돈 없음 ㅎ </p>
    </div>

</body>
</html>
