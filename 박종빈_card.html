<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>내 버킷리스트 카드</title>
    <style>
      /* 공통 카드 스타일 */
      .card {
        float: left;
        width: 31.33%;
        margin: 1%;
        background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
        padding: 15px 15px 35px 15px;
        border-radius: 2px 2px 15px 5px;
        box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.15);
        position: relative; /* 자식인 badge의 기준점 */
        transform: rotate(-3deg);
        transition:
          transform 0.3s ease,
          z-index 0s;
      }
      .card:hover {
        transform: scale(1.05) rotate(0deg);
        z-index: 10;
      }
      .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 5px;
        margin-bottom: 15px;
      }
      .card h2 {
        color: #2c3e50;
        font-size: 1.8rem;
        margin-bottom: 10px;
        transition: transform 0.3s ease;
      }
      .card h2:hover {
        color: #547190;
        transform: scale(1.05);
        font-size: 1.9rem;
      }
      .card p {
        color: #444;
        font-size: 1.3rem;
        text-align: left;
        line-height: 1.5;
        transition: transform 0.3s ease;
      }
      .card p:hover {
        color: #6b6b6b;
        font-size: 1.4rem;
        transform: translatex(5px);
      }
      .card .imgbadge:hover {
        transform: scale(1.1) rotate(5deg);
      }
      .card:active h2 {
        visibility: hidden;
      }
      .card:active p {
        visibility: hidden;
      }
      .secret-memo {
        color: #d38585;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        letter-spacing: 2px;
        line-height: 1.5;
      }
      .card:active .secret-memo {
        visibility: visible !important;
      }
    </style>
  </head>
  <body>
    <!-- 박종빈 카드 -->
    <div class="card">
      <!-- 스티커 뱃지 -->
      <div
        class="badge"
        style="
          position: absolute;
          left: -30px;
          top: -15px;
          transform: rotate(15deg);
        "
      >
        <img
          class="imgbadge"
          src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHZ5BBGz5nVZhvgL06Ko-uGwoLgRx97-o6tJvU4l3ijHEso8O9SzoWX7XcyuJKlLBk6OiWcUWVio2mM8iV1YE3Swo53jmrSvQmT3NXRPzz5XfZMpyR9a8EtARYy4ZoyAACAoPWG6-aJaEg/s856/ofuro_drink_milk_man.png"
          alt="마시는청년"
          style="width: 100px; height: auto"
        />
      </div>
      <!-- 카드 뱃지 2 -->
      <div
        class="badge"
        style="
          position: absolute;
          left: 80%;
          top: 65%;
          transform: rotate(-10deg);
        "
      >
        <img
          class="imgbadge"
          src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhWeouqNBExYgKoajsCY6GzswFrqL8oTULMreJAs3fqv7U1zhE5E8rHKIy69B7UyhzZbeap090NZhHsfrLrhIwIHRa1B5vsBTvE6awafUns9eYawZh1zml5RT1F3c3oAK9GIMmiwalQ1uXK/s1600/camp_chairing_man.png"
          alt="쉬는청년"
          style="width: 110px; height: auto"
        />
      </div>
      <!-- 카드 배경 이미지 -->
      <img
        src="https://cdn.pixabay.com/photo/2015/03/28/10/21/diet-695723_1280.jpg"
        alt="샌드위치 캘리퍼스"
      />
      <h2>박종빈의 하고 싶은거</h2>
      <p>1. 하루 1시간 이상 운동하기</p>
      <p>2. 커스텀 기록 어플 만들기</p>

      <div class="secret-memo" style="visibility: hidden">
        피부도 좋아지고 싶다 !
      </div>
    </div>
  </body>
</html>
