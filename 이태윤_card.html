<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>내 버킷리스트 카드</title>
    <style>
        /* 기본 카드 디자인 (자유롭게 수정 가능) */
        .card {
            width: 300px;
            margin: 50px auto;
            background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.15);
            /* 배지의 기준점이 되기 위한 필수 속성 */
            position: relative;
            visibility: visible;
            box-shadow: 10px 10px 10px pink;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .card h2 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .card p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .card:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }

        .card .hidden {
            visibility: hidden;
        }

        .card:hover .hidden {
            visibility: visible;
        }

        .stk {
            box-sizing: border-box;
            position: absolute;
            height: 25px;
            width: 40px;
            left:-20px;
            top: -10px;
            padding: 0 auto;
            margin: 0 auto;
            background-color: pink;
            border-radius: 10px;
            text-align: center;
            rotate:-10deg;
        }



        /* 1. 배지 (absolute) 관련 CSS를 작성하세요 */


        /* 2. 비밀 메모 (visibility) 및 hover 효과 관련 CSS를 작성하세요 */
    </style>
</head>

<body>

    <div class="card">
        <img src="https://ak-d.tripcdn.com/images/0101r12000a5mkr6569CC_W_1440_810_Q80.webp?proc=source%2ftrip"
            alt="일본 오사카 성">

        <h2>✨ 이태윤 꿈</h2>
        <p>⛩️ 1.일본 오사카 관광지 탐방</p>
        <p>💻 2. 게임 프로젝트 참여 및 만들기</p>
        <p class="hidden">노트북 사줘잉~</p>
        <div class="stk">꼭!</div>

    </div>
</body>

</html>
